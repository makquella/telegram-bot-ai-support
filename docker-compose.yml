version: "3.8"

services:
  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - redis
      - qdrant
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - bot-data:/app/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  bot-data:
  redis-data:
  qdrant-data:
